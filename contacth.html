<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="contacts.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <p>Personal Course Organizer</p>
    </header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="coursesh.html">My Courses</a></li>
        <li><a href="addh.html">Add Courses</a></li>
        <li><a href="contacth.html">Contact Us</a></li>
      </ul>
    </nav>
    <main>
      <br />
      <section>
        <h2>Contact Us</h2>
        <div class="fset">
          <fieldset>
            <legend>Communication Info</legend>
            <form>
              <div class="align">
                <label for="nam">Your Name</label>
                <input
                  name="name"
                  title="e.g., Ziad"
                  id="nam"
                  type="text"
                  placeholder="enter your name here (In Arabic)"
                  required
                />
              </div>
              <div class="align">
                <label for="idd">ID</label>
                <input
                  name="ID"
                  title="e.g., 20250398"
                  id="idd"
                  type="text"
                  placeholder="enter your ID here"
                  required
                />
              </div>
              <div class="align">
                <label for="cre">University Email</label>
                <input
                  name="email"
                  id="cre"
                  type="email"
                  placeholder="enter your email of your university here"
                  required
                />
              </div>
              <div class="align">
                <label for="pass">Password</label>
                <input
                  name="password"
                  id="pass"
                  type="password"
                  placeholder="enter your password here"
                  required
                />
              </div>
              <div class="align">
                <label for="pro">Problem</label>
                <textarea
                  id="pro"
                  placeholder="what is the problem you want to complain"
                  required
                ></textarea>
              </div>
              <button type="submit" class="btn1">Save</button>
              <button type="reset" class="btn2">Reset</button>
            </form>
          </fieldset>
        </div>
      </section>
      <br />
    </main>
    <footer>
      <p>Made by Ziad 20250398</p>
    </footer>
  </body>
</html>
